name: Sync Jira Daily

on:
  push:
    paths:
      - "planning/today.yaml"
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        run: node scripts/sync-today.js
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          DEFAULT_PROJECT_KEY: CATHAY
          DEFAULT_ASSIGNEE_EMAIL: ${{ secrets.JIRA_EMAIL }}